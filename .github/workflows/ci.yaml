name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t ghcr.io/1705alwwan/tebakwarna:latest \
            .

      - name: Push Image
        run: |
          docker push \
            ghcr.io/1705alwwan/tebakwarna:latest

      - name: Show Image
        run: |
          echo "Image pushed:"
          echo "ghcr.io/1705alwwan/tebakwarna:latest"
